version: 0.2
phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 278513763034.dkr.ecr.us-east-1.amazonaws.com
  build:
    commands:
      - echo Build started on date
      - cd server
      - echo Building the Docker image...
      - docker build -t unitalks-backend .
      - docker tag unitalks-backend:latest 278513763034.dkr.ecr.us-east-1.amazonaws.com/unitalks-backend:latest
  post_build:
    commands:
      - echo Build completed on date
      - echo Pushing the Docker image...
      - docker push 278513763034.dkr.ecr.us-east-1.amazonaws.com/unitalks-backend:latest
